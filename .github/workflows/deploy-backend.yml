name: Deploy Backend to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Cloud Authentication
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Authentication
      run: |
        gcloud auth configure-docker gcr.io --quiet

    - name: Inject Firebase Secret
      working-directory: ./backend
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > serviceAccountKey.json

    - name: Build Docker Image
      working-directory: ./backend
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasmine-backend:latest .

    - name: Push Container to GCR
      run: |
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasmine-backend:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy jasmine-backend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasmine-backend:latest \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --set-env-vars FIREBASE_SERVICE_ACCOUNT_KEY_PATH="serviceAccountKey.json"
